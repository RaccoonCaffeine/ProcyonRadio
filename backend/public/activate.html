<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activación - ProcyonRadio</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --color-bg: #f8fafc; /* Slate 50 */
      --color-card: #ffffff;
      --color-text-main: #0f172a; /* Slate 900 */
      --color-text-muted: #64748b; /* Slate 500 */
      --color-primary: #4f46e5; /* Indigo 600 */
      --color-primary-hover: #4338ca; /* Indigo 700 */
      --color-border: #e2e8f0; /* Slate 200 */
      --color-error: #ef4444; /* Red 500 */
      --color-success: #10b981; /* Emerald 500 */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0b0f19; /* Very dark slate */
        --color-card: #111827; /* Dark gray */
        --color-text-main: #f9fafb; /* Light gray */
        --color-text-muted: #9ca3af;
        --color-primary: #6366f1; /* Indigo 500 */
        --color-primary-hover: #4f46e5;
        --color-border: #1f2937;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.3s ease;
    }

    /* Ambient Glow (Background effects) */
    .glow-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      filter: blur(80px);
    }
    .glow-2 {
      position: absolute;
      bottom: -10%;
      left: -10%;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      filter: blur(80px);
    }

    /* Activation Card */
    .card {
      background-color: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 24px;
      width: 100%;
      max-w: 420px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      z-index: 10;
      text-align: center;
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Logo Styling */
    .logo-container {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .logo-svg {
      height: 64px;
      width: auto;
      color: var(--color-text-main);
      transition: color 0.3s ease;
    }

    /* Header */
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    p.subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    /* Form */
    form {
      display: flex;
      flex-col: column;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      text-align: left;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      font-size: 15px;
      font-family: inherit;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      background-color: var(--color-bg);
      color: var(--color-text-main);
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      background-color: var(--color-card);
    }

    /* Button */
    button {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      background-color: var(--color-primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
    }

    button:hover:not(:disabled) {
      background-color: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.2);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      animation: spin 1s linear infinite;
      display: none;
    }

    /* Alerts */
    .alert {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      display: none;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.4;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .alert-error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--color-error);
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--color-success);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    <h1>Activa tu copia</h1>
    <p class="subtitle">Ingresa tu clave de activación de ProcyonRadio para desbloquear el panel de control.</p>

    <div id="alert-box" class="alert">
      <i id="alert-icon" class="fa-solid"></i>
      <span id="alert-msg"></span>
    </div>

    <form id="activation-form" style="margin-top: 24px;">
      <div class="form-group">
        <label for="license-key">Clave de Licencia</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-key"></i>
          <input type="text" id="license-key" required placeholder="PROCYON-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <button type="submit" id="btn-submit">
        <i class="fa-solid fa-circle-notch spinner" id="spinner"></i>
        <span id="btn-text">Activar Licencia</span>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('activation-form');
    const input = document.getElementById('license-key');
    const button = document.getElementById('btn-submit');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const alertBox = document.getElementById('alert-box');
    const alertIcon = document.getElementById('alert-icon');
    const alertMsg = document.getElementById('alert-msg');

    function showAlert(message, isSuccess = false) {
      alertBox.style.display = 'flex';
      alertBox.className = `alert ${isSuccess ? 'alert-success' : 'alert-error'}`;
      alertIcon.className = `fa-solid ${isSuccess ? 'fa-circle-check' : 'fa-circle-exclamation'}`;
      alertMsg.textContent = message;
    }

    function hideAlert() {
      alertBox.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const key = input.value.trim();
      if (!key) return;

      // Reset UI state
      hideAlert();
      button.disabled = true;
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Verificando...';

      try {
        const response = await fetch('/api/activate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ key })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showAlert(data.message || '¡Activado con éxito! Redirigiendo...', true);
          input.disabled = true;
          button.disabled = true;
          spinner.style.display = 'none';
          btnText.textContent = '¡Listo!';

          // Redirect to home after 2 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          showAlert(data.error || 'La clave ingresada no es válida.');
          button.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Activar Licencia';
        }
      } catch (err) {
        showAlert('Error de conexión con el servidor. Inténtalo de nuevo.');
        button.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Activar Licencia';
      }
    });
  </script>
